<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false">

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="login-screen" class="screen">
        <div class="card shadow">
            <h2>Жүйеге кіру</h2>
            <input type="password" id="pass-input" placeholder="Парольді енгізіңіз (7777)">
            <button class="primary-btn" onclick="checkLogin()">Кіру</button>
            <p id="error-msg" class="error-text"></p>
        </div>
    </div>

    <div id="home-screen" class="screen hidden">
        <div class="card shadow">
            <h1>Қош келдіңіз!</h1>
            <p>Тест 100 сұрақтан тұрады. Сәттілік!</p>
            <button class="primary-btn" onclick="startQuiz()">Бастау</button>
        </div>
    </div>

    <div id="quiz-screen" class="screen hidden">
        <div class="top-bar">
            <span id="q-counter">1 / 100</span>
            <div id="progress-wrapper"><div id="progress-fill"></div></div>
        </div>
        <div class="card quiz-card">
            <h3 id="question-display"></h3>
            <div id="options-box" class="options-grid"></div>
        </div>
    </div>

    <div id="result-screen" class="screen hidden">
        <div class="card shadow">
            <h2>Тест аяқталды</h2>
            <div id="final-result"></div>
            <button class="primary-btn" onclick="location.reload()">Қайта бастау</button>
        </div>
    </div>

    <div id="music-control" class="music-btn" onclick="toggleMusic()">🎵</div>

    <script src="script.js"></script>
</body>
</html>

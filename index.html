 <!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Онлайн тест жүйесі</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Басты бет -->
  <div id="home" class="page active">
    <h1>Онлайн тест жүйесі</h1>
    <button id="startBtn">Тестті бастау</button>
  </div>

  <!-- Тест беті -->
  <div id="quiz" class="page">
    <div class="progress-container">
      <div id="progressBar"></div>
    </div>
    <div id="timer">30:00</div>
    <div id="questionContainer">
      <h2 id="questionText"></h2>
      <div id="options"></div>
    </div>
  </div>

  <!-- Нәтиже беті -->
  <div id="result" class="page">
    <h2>Нәтиже</h2>
    <p id="scoreText"></p>
    <p id="details"></p>
    <button id="retryBtn">Қайта тапсыру</button>
  </div>

  <footer>
    Жасаған — Ayan KZ
  </footer>

  <script src="script.js"></script>
</body>
</html>

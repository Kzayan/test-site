<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Test System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false">

    <div id="auth-page" class="page">
        <div class="card">
            <h2>Жүйеге кіру</h2>
            <p>Жалғастыру үшін пароль енгізіңіз</p>
            <input type="password" id="pass-input" placeholder="Пароль: 7777">
            <button onclick="checkAuth()">Кіру</button>
            <p id="auth-msg" class="error-text"></p>
        </div>
    </div>

    <div id="main-page" class="page hidden">
        <div class="card">
            <h1>Тестке қош келдіңіз!</h1>
            <div class="controls">
                <button onclick="toggleMode('dark')">🌙 Dark Mode</button>
                <button onclick="toggleMode('eye')">☁️ Eye Comfort</button>
                <button onclick="toggleMode('large')">A+ Шрифт</button>
            </div>
            <p>Сұрақтар саны: <span id="q-total-info">100</span></p>
            <p>Уақыт: 30 минут</p>
            <button class="primary-btn" onclick="startQuiz()">Тестті бастау</button>
            <div class="footer">Жасаған — Ayan KZ</div>
        </div>
    </div>

    <div id="quiz-page" class="page hidden">
        <div class="quiz-container">
            <div class="quiz-header">
                <div class="timer" id="timer">30:00</div>
                <div class="q-progress">Сұрақ: <span id="current-idx">1</span> / <span id="total-idx">100</span></div>
            </div>
            <div class="progress-bar-wrap">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <h2 id="question-text">Сұрақ жүктелуде...</h2>
            <div id="answer-list" class="answer-grid"></div>
        </div>
    </div>

    <div id="result-page" class="page hidden">
        <div class="card">
            <h2>Тест аяқталды!</h2>
            <div id="stats" class="stats">
                </div>
            <button class="primary-btn" onclick="location.reload()">Қайта тапсыру</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

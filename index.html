 <!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <title>Онлайн Тест</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Пароль енгізу беті -->
  <div id="login-page">
    <h2>Пароль енгізіңіз</h2>
    <input type="password" id="password-input" placeholder="Пароль">
    <button onclick="checkPassword()">Кіру</button>
    <p id="error-message"></p>
  </div>

  <!-- Басты бет -->
  <div id="main-page" class="hidden">
    <h1>Онлайн Тест Сайты</h1>
    <button onclick="startTest()">Тестті бастау</button>
  </div>

  <!-- Тест беті -->
  <div id="test-page" class="hidden">
    <div id="progress-container">
      <span id="question-number"></span>
      <div id="progress-bar"><div id="progress"></div></div>
      <span id="timer"></span>
    </div>
    <div id="question-container"></div>
  </div>

  <!-- Нәтиже беті -->
  <div id="result-page" class="hidden">
    <h2>Нәтиже</h2>
    <p id="result-text"></p>
    <button onclick="restartTest()">Қайта тапсыру</button>
  </div>

  <footer>
    <p>Жасаған — Ayan KZ</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>

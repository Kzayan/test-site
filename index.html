<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Test Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

    <div id="login-screen" class="screen">
        <div class="card shadow">
            <h2>Кіру</h2>
            <input type="password" id="password-input" placeholder="Пароль">
            <button onclick="checkPassword()">Кіру</button>
            <p id="login-error" class="error-text"></p>
        </div>
    </div>

    <div id="home-screen" class="screen hidden">
        <div class="card shadow animate-fade">
            <h1>Қош келдіңіз!</h1>
            <p>Тест тапсырмаларына дайынсыз ба?</p>
            <div class="controls">
                <button onclick="setTheme('dark')">Dark Mode</button>
                <button onclick="setTheme('eye')">Eye Comfort</button>
                <button onclick="setTheme('large')">Large Text</button>
            </div>
            <button class="primary-btn" onclick="startQuiz()">Тестті бастау</button>
            <footer class="footer">Жасаған — Ayan KZ</footer>
        </div>
    </div>

    <div id="quiz-screen" class="screen hidden">
        <div class="top-nav">
            <span id="q-counter">1 / 85</span>
            <div id="timer-box">30:00</div>
        </div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div class="card quiz-card">
            <h3 id="question-label"></h3>
            <div id="options-list" class="options-grid"></div>
        </div>
    </div>

    <div id="result-screen" class="screen hidden">
        <div class="card shadow">
            <h2>Нәтиже</h2>
            <div id="stats-output"></div>
            <button class="primary-btn" onclick="location.reload()">Қайта тапсыру</button>
        </div>
    </div>

    <div id="alert-box" class="alert-msg hidden"></div>

    <script src="script.js"></script>
</body>
</html>

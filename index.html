<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>QazTest | 100 сұрақ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e8f0fe 0%, #d4e4fc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .app-wrapper {
            width: 100%;
            max-width: 780px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 25px 50px -10px rgba(0, 40, 100, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.6);
            padding: 28px 24px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        h1, h2, h3 {
            font-weight: 600;
            color: #0b2b4f;
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .blue-accent {
            color: #1e6df2;
        }

        .subhead {
            color: #2c3e66;
            font-size: 1rem;
            font-weight: 400;
            border-left: 4px solid #1e6df2;
            padding-left: 16px;
            margin: 16px 0 24px 0;
        }

        .btn {
            background: white;
            border: none;
            border-radius: 60px;
            padding: 14px 28px;
            font-weight: 600;
            font-size: 1.1rem;
            color: #0b2b4f;
            box-shadow: 0 4px 14px rgba(0, 55, 120, 0.1);
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid rgba(30, 109, 242, 0.2);
            width: fit-content;
        }

        .btn-primary {
            background: #1e6df2;
            color: white;
            box-shadow: 0 10px 20px -7px #1e6df2;
            border: none;
        }

        .btn-primary:hover {
            background: #0a4fd0;
            transform: scale(1.02);
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #1e6df2;
            color: #1e6df2;
        }

        .btn-outline:hover {
            background: #e8f0fe;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.6);
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 28px;
            border: 1px solid white;
        }

        .progress-container {
            flex: 2;
            min-width: 180px;
        }

        .progress-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #2f4a7a;
            margin-bottom: 4px;
        }

        .progress-track {
            background: rgba(0,60,130,0.1);
            height: 10px;
            border-radius: 30px;
            overflow: hidden;
            width: 100%;
        }

        .progress-fill {
            background: linear-gradient(90deg, #1e6df2, #6299ff);
            height: 10px;
            width: 0%;
            border-radius: 30px;
            transition: width 0.25s ease;
        }

        .timer-box {
            background: #0b2b4f;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.4rem;
            letter-spacing: 1px;
            box-shadow: inset 0 -2px 0 #a0c4ff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .timer-icon {
            font-size: 1.2rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin: 28px 0 20px;
        }

        .option-item {
            background: white;
            border-radius: 28px;
            padding: 16px 12px;
            font-weight: 500;
            color: #0e2d4f;
            box-shadow: 0 6px 12px rgba(0, 35, 70, 0.04);
            border: 2px solid transparent;
            transition: all 0.15s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            word-break: break-word;
        }

        .option-item:hover {
            background: #f0f7ff;
            border-color: #b5d2ff;
        }

        .option-letter {
            background: #e2ebf9;
            width: 36px;
            height: 36px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #1e6df2;
            flex-shrink: 0;
        }

        .option-item.correct {
            background: #e1f7e1;
            border-color: #2ecc71;
        }

        .option-item.correct .option-letter {
            background: #2ecc71;
            color: white;
        }

        .option-item.incorrect {
            background: #ffe5e5;
            border-color: #e74c3c;
        }

        .option-item.incorrect .option-letter {
            background: #e74c3c;
            color: white;
        }

        .option-item.selected {
            background: #d8eaff;
            border-color: #1e6df2;
        }

        .option-item.selected .option-letter {
            background: #1e6df2;
            color: white;
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #002856;
        }

        .badge {
            background: #1e6df2;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .result-summary {
            background: #e0edff;
            border-radius: 40px;
            padding: 28px;
            text-align: center;
            margin: 20px 0;
        }

        .score-number {
            font-size: 4rem;
            font-weight: 800;
            color: #1e6df2;
            line-height: 1;
        }

        .footer-note {
            margin-top: 32px;
            text-align: center;
            color: #4e5e7e;
            font-size: 0.9rem;
            border-top: 1px dashed #a0bede;
            padding-top: 20px;
        }

        .nav-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .fade-in {
            animation: fade 0.3s;
        }

        @keyframes fade {
            0% { opacity: 0.3; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .hide {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        @media (max-width: 500px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            .timer-box {
                font-size: 1.2rem;
                padding: 6px 16px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
<div class="app-wrapper" id="app">
    <div id="homeScreen" class="card fade-in">
        <h1>🧠 QazTest <span class="blue-accent">100</span></h1>
        <div class="subhead">Қазақша тест — 100 сұрақ, 4 жауап нұсқасы</div>
        <div style="background: #ffffff99; border-radius: 30px; padding: 20px; margin: 20px 0;">
            <p style="margin-bottom: 12px;">📌 <strong>Ереже:</strong> Әр сұраққа бір жауап. Таңдаған соң автоматты түрде келесі сұрақ.</p>
            <p>⏱️ Уақыт: <strong>30 минут</strong>. Соңында балл көрсетіледі.</p>
        </div>
        <button class="btn btn-primary" id="startTestBtn">▶ Тестті бастау</button>
        <div class="footer-note">Жасаған — Ayan KZ</div>
    </div>

    <div id="testScreen" class="card fade-in hide">
        <div class="stats-bar">
            <div class="progress-container">
                <div class="progress-label"><span id="currentQNo">1</span>/<span id="totalQ">100</span></div>
                <div class="progress-track"><div class="progress-fill" id="progressFill" style="width: 0%;"></div></div>
            </div>
            <div class="timer-box" id="timerDisplay">⏳ 30:00</div>
        </div>

        <div id="questionContainer">
            <div class="question-text" id="questionText">Сұрақ жүктелуде...</div>
            <div class="options-grid" id="optionsContainer"></div>
        </div>

        <div style="display: flex; justify-content: flex-end;">
            <span class="badge" id="answeredCounter">0/100</span>
        </div>
    </div>

    <div id="resultScreen" class="card fade-in hide">
        <h1 style="font-size: 2rem;">📊 Нәтиже</h1>
        <div class="result-summary">
            <div class="score-number" id="finalScore">0</div>
            <div style="font-size: 1.6rem; font-weight: 300;" id="finalScoreText">/ 100 балл</div>
            <div style="display: flex; gap: 20px; justify-content: center; margin: 20px 0;">
                <div><span style="font-weight: 800; color: green;" id="correctCount">0</span> дұрыс</div>
                <div><span style="font-weight: 800; color: #c64756;" id="wrongCount">0</span> қате</div>
            </div>
        </div>
        <div class="nav-row">
            <button class="btn btn-outline" id="retryBtn">🔄 Қайта тапсыру</button>
            <button class="btn btn-primary" id="homeBtn">🏠 Басты бет</button>
        </div>
        <div class="footer-note">Жасаған — Ayan KZ</div>
    </div>
</div>

    // ---------- ГЛОБАЛДЫ АЙНЫМАЛЫЛАР ----------
    let currentIndex = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let timerInterval = null;
    let timeSeconds = 30 * 60;

    // DOM элементтері
    const homeScreen = document.getElementById('homeScreen');
    const testScreen = document.getElementById('testScreen');
    const resultScreen = document.getElementById('resultScreen');
    const startBtn = document.getElementById('startTestBtn');
    const retryBtn = document.getElementById('retryBtn');
    const homeBtn = document.getElementById('homeBtn');

    const questionText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const currentQNo = document.getElementById('currentQNo');
    const totalQ = document.getElementById('totalQ');
    const progressFill = document.getElementById('progressFill');
    const answeredCounter = document.getElementById('answeredCounter');
    const timerDisplay = document.getElementById('timerDisplay');

    const finalScore = document.getElementById('finalScore');
    const finalScoreText = document.getElementById('finalScoreText');
    const correctCountSpan = document.getElementById('correctCount');
    const wrongCountSpan = document.getElementById('wrongCount');

    totalQ.innerText = questions.length;

    function updateTimerDisplay() {
        const mins = Math.floor(timeSeconds / 60);
        const secs = timeSeconds % 60;
        timerDisplay.innerText = `⏳ ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        if (timeSeconds <= 0) {
            clearInterval(timerInterval);
            finishTest();
        }
    }

    function resetTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timeSeconds = 30 * 60;
        updateTimerDisplay();
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (timeSeconds > 0) {
                timeSeconds--;
                updateTimerDisplay();
            } else {
                finishTest();
            }
        }, 1000);
    }

    function showHome() {
        homeScreen.classList.remove('hide');
        testScreen.classList.add('hide');
        resultScreen.classList.add('hide');
        resetTimer();
    }

    function showTest() {
        homeScreen.classList.add('hide');
        testScreen.classList.remove('hide');
        resultScreen.classList.add('hide');
        renderQuestion();
        updateProgress();
        startTimer();
    }

    function showResult() {
        homeScreen.classList.add('hide');
        testScreen.classList.add('hide');
        resultScreen.classList.remove('hide');
        if (timerInterval) clearInterval(timerInterval);
        displayResults();
    }

    function renderQuestion() {
        if (!testScreen.classList.contains('hide')) {
            const q = questions[currentIndex];
            questionText.innerText = q.question;

            let htmlStr = '';
            const letters = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, idx) => {
                let additionalClass = '';
                if (userAnswers[currentIndex] !== null) {
                    if (idx === q.correct) {
                        additionalClass = 'correct';
                    } else if (idx === userAnswers[currentIndex] && idx !== q.correct) {
                        additionalClass = 'incorrect';
                    }
                } else if (userAnswers[currentIndex] === idx) {
                    additionalClass = 'selected';
                }
                
                htmlStr += `<div class="option-item ${additionalClass}" data-opt-index="${idx}">
                    <span class="option-letter">${letters[idx]}</span>
                    <span>${opt}</span>
                </div>`;
            });
            optionsContainer.innerHTML = htmlStr;

            document.querySelectorAll('.option-item').forEach(optDiv => {
                optDiv.addEventListener('click', () => {
                    const idx = parseInt(optDiv.dataset.optIndex);
                    handleAnswerSelect(idx);
                });
            });

            currentQNo.innerText = currentIndex + 1;
            const answeredCount = userAnswers.filter(a => a !== null).length;
            answeredCounter.innerText = `${answeredCount}/${questions.length}`;
            progressFill.style.width = `${((currentIndex + 1) / questions.length) * 100}%`;
        }
    }

    function handleAnswerSelect(optIndex) {
        if (userAnswers[currentIndex] !== null) return; // Бір рет таңдау
        
        userAnswers[currentIndex] = optIndex;
        renderQuestion(); // Жауапты көрсету (жасыл/қызыл)
        
        // 1 секунд кідіріспен келесі сұраққа өту
        setTimeout(() => {
            if (currentIndex + 1 < questions.length) {
                currentIndex++;
                renderQuestion();
                updateProgress();
            } else {
                finishTest();
            }
        }, 800);
    }

    function finishTest() {
        showResult();
    }

    function updateProgress() {
        const answered = userAnswers.filter(a => a !== null).length;
        answeredCounter.innerText = `${answered}/${questions.length}`;
        progressFill.style.width = `${((currentIndex + 1) / questions.length) * 100}%`;
    }

    function displayResults() {
        let correct = 0;
        for (let i = 0; i < questions.length; i++) {
            if (userAnswers[i] === questions[i].correct) correct++;
        }
        const wrong = questions.length - correct;
        finalScore.innerText = correct;
        finalScoreText.innerText = `/ ${questions.length} балл`;
        correctCountSpan.innerText = correct;
        wrongCountSpan.innerText = wrong;
    }

    function resetTest() {
        currentIndex = 0;
        userAnswers = new Array(questions.length).fill(null);
        resetTimer();
        showTest();
    }

    startBtn.addEventListener('click', resetTest);
    retryBtn.addEventListener('click', resetTest);
    homeBtn.addEventListener('click', showHome);

    showHome();
})();

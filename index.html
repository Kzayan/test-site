<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Онлайн Тест</title>
  <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">
  <!-- Пароль енгізу беті -->
  <div id="login-page" class="page">
    <h2>Пароль енгізіңіз</h2>
    <input type="password" id="password-input" placeholder="Пароль">
    <button onclick="checkPassword()">Кіру</button>
    <p id="login-message"></p>
  </div>

  <!-- Басты бет -->
  <div id="main-page" class="page hidden">
    <h1>Онлайн Тест</h1>
    <button onclick="startTest()">Тестті бастау</button>
  </div>

  <!-- Тест беті -->
  <div id="test-page" class="page hidden">
    <div id="progress-bar"></div>
    <div id="timer"></div>
    <h3 id="question-number"></h3>
    <p id="question-text"></p>
    <div id="answers"></div>
  </div>

  <!-- Нәтиже беті -->
  <div id="result-page" class="page hidden">
    <h2>Нәтиже</h2>
    <p id="result-summary"></p>
    <button onclick="restartTest()">Қайта тапсыру</button>
  </div>

  <footer>
    Жасаған — Ayan KZ
  </footer>

  <script src="script.js"></script>
</body>
</html>
